<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
    <title>Teleflex SO — Salud Ocupacional</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ============================================================
           1. SISTEMA DE COLORES
           ============================================================ */
        :root {
            --primary-bg: #0d4444; /* Verde oscuro del gradiente */
            --secondary-bg: #1a3a5c; /* Azul oscuro del gradiente */
            --btn-green: #3a8076;    /* El verde del botón en tu imagen */
            --nv: #0F2942;           /* Azul Teleflex */
            --tx: #0F172A;
            --tx2: #64748B;
            --nh: 85px;              /* Altura del menú */
        }

        /* Colores de fondo por Rol (se aplican después del login) */
        .bg-medico { background-color: #F1F5F9 !important; background-image: none !important; }
        .bg-enfermeria { background-color: #E0F2FE !important; background-image: none !important; }
        .bg-nutricion { background-color: #DCFCE7 !important; background-image: none !important; }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at center, var(--secondary-bg) 0%, var(--primary-bg) 100%);
            min-height: 100vh;
            color: var(--tx);
            font-size: 16px;
            transition: background 0.5s ease;
        }

        /* ============================================================
           2. LOGIN (IGUAL A TU IMAGEN)
           ============================================================ */
        #login-screen {
            position: fixed; inset: 0; z-index: 2000;
            display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 25px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            text-align: center;
        }
        .login-icon {
            background: var(--btn-green);
            width: 60px; height: 60px;
            margin: 0 auto 15px;
            border-radius: 15px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 24px;
            box-shadow: 0 8px 15px rgba(58, 128, 118, 0.3);
        }
        .login-card h2 { color: var(--nv); font-size: 24px; font-weight: 800; margin-bottom: 5px; }
        .login-card p { color: var(--tx2); font-size: 13px; margin-bottom: 30px; }
        
        .login-card .fi { text-align: left; }
        .login-card label { 
            display: block; font-size: 10px; font-weight: 800; 
            color: #94a3b8; letter-spacing: 1px; margin-bottom: 8px;
        }
        .login-card select {
            width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; 
            border-radius: 12px; font-size: 14px; outline: none;
            appearance: none; background: url("data:image/svg+xml,...") no-repeat right 15px center;
        }

        .btn-login {
            width: 100%; background: var(--btn-green); color: white;
            padding: 15px; border: none; border-radius: 12px;
            font-size: 16px; font-weight: 700; cursor: pointer;
            margin-top: 10px; transition: 0.3s;
        }
        .btn-login:hover { opacity: 0.9; transform: translateY(-2px); }

        /* ============================================================
           3. NAVEGACIÓN Y PANTALLAS
           ============================================================ */
        #app { display: none; }
        .nav {
            position: fixed; top: 0; left: 0; right: 0; height: var(--nh);
            z-index: 1000; background: var(--nv); display: flex; align-items: center;
            padding: 0 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .nav-brand { color: white; font-weight: 800; font-size: 20px; }
        .nav-tabs { display: flex; gap: 5px; margin-left: 30px; }
        .tb {
            background: none; border: none; color: rgba(255,255,255,0.6);
            font-size: 15px; font-weight: 600; cursor: pointer;
            padding: 10px 15px; border-radius: 8px; transition: 0.2s;
        }
        .tb.on { color: white; background: rgba(255,255,255,0.1); }

        .sc {
            display: none; 
            padding: calc(var(--nh) + 40px) 25px 50px; 
            max-width: 1200px; margin: 0 auto;
        }
        .sc.on { display: block; }

        .card { background: white; border-radius: 20px; padding: 30px; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 5px 20px rgba(0,0,0,0.02); }
    </style>
</head>
<body>

<!-- PANTALLA DE LOGIN (ESTILO IMAGEN) -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-icon">🩺</div>
    <h2>Teleflex SO</h2>
    <p>Módulo Unificado — Salud Ocupacional</p>
    
    <div class="fi">
      <label>SELECCIONA TU USUARIO</label>
      <select id="login-sel">
        <option value="">Cargando...</option>
      </select>
    </div>
    
    <button class="btn-login" onclick="doLogin()">Entrar →</button>
  </div>
</div>

<!-- APP PRINCIPAL -->
<div id="app">
  <nav class="nav">
    <div class="nav-brand">Teleflex SO</div>
    <div class="nav-tabs" id="nav-tabs"></div>
    <div id="user-info" style="margin-left:auto; color:white; font-size:14px;"></div>
  </nav>

  <div class="sc on" id="sc-inicio">
    <div class="card">
        <h2 id="title-modulo">Bienvenido</h2>
        <p style="color:var(--tx2)">Selecciona una opción del menú para comenzar.</p>
    </div>
  </div>
  
  <div class="sc" id="sc-captura">
      <div class="card">
          <h2>Módulo de Captura</h2>
          <p>Aquí se diseñarán los formularios en la siguiente fase.</p>
      </div>
  </div>
</div>

<script>
/* --- CONFIGURACIÓN DE USUARIOS --- */
const usuarios = [
  { nombre: "Dr. Jaime Martinez", rol: "medico" },
  { nombre: "Enf. Socorro Sanchez", rol: "enfermeria" },
  { nombre: "Lic. Nutrición", rol: "nutricion" }
];

document.addEventListener('DOMContentLoaded', () => {
  const sel = document.getElementById('login-sel');
  sel.innerHTML = '<option value="">— Seleccionar —</option>' + 
    usuarios.map(u => `<option value='${JSON.stringify(u)}'>${u.nombre}</option>`).join('');
});

function doLogin() {
  const val = document.getElementById('login-sel').value;
  if (!val) return;
  
  const user = JSON.parse(val);
  
  // 1. Cambiar fondo según rol
  document.body.className = ''; 
  document.body.classList.add('bg-' + user.rol);

  // 2. Mostrar App
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('user-info').textContent = user.nombre;
  document.getElementById('title-modulo').textContent = "Módulo " + user.rol.charAt(0).toUpperCase() + user.rol.slice(1);
  
  renderMenu();
}

function renderMenu() {
  const tabs = [
    { id: 'inicio', label: '🏠 Inicio' },
    { id: 'captura', label: '📝 Captura' }
  ];
  document.getElementById('nav-tabs').innerHTML = tabs.map(t => 
    `<button class="tb" id="tb-${t.id}" onclick="go('${t.id}')">${t.label}</button>`
  ).join('');
  document.getElementById('tb-inicio').classList.add('on');
}

function go(id) {
  document.querySelectorAll('.sc').forEach(s => s.classList.remove('on'));
  document.getElementById('sc-' + id).classList.add('on');
  document.querySelectorAll('.tb').forEach(b => b.classList.remove('on'));
  document.getElementById('tb-' + id).classList.add('on');
}
</script>
</body>
</html>
