<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
    <title>AUNA Salud Ocupacional - Fase 2</title>
    
    <!-- FUENTES Y LIBRERIAS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        /* ============================================================
           1. VARIABLES GLOBALES Y TEMAS
           ============================================================ */
        :root {
            --nv: #0F2942;   /* Azul Marino */
            --gold: #B8962E; /* Dorado */
            --tl: #0D6B5E;   /* Teal */
            --gr: #16A34A;   /* Verde */
            --rd: #DC2626;   /* Rojo */
            --am: #D97706;   /* Ámbar */
            --sf2: #F8FAFC;
            --nh: 85px;      /* Altura Menú */
        }

        /* Fondos Dinámicos por Rol */
        .bg-medico { background-color: #F1F5F9 !important; }
        .bg-enfermeria { background-color: #E0F2FE !important; }
        .bg-nutricion { background-color: #DCFCE7 !important; }

        /* ============================================================
           2. ESTILOS BASE Y CUERPO
           ============================================================ */
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 16px;
            line-height: 1.6;
            transition: background-color 0.5s ease;
        }

        /* ============================================================
           3. LOGIN (GRADIENTE VERDE-AMARILLO)
           ============================================================ */
        #login-screen {
            position: fixed; inset: 0; z-index: 9999;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #16A34A 0%, #FDE047 100%);
        }
        .login-card {
            background: white; padding: 45px; border-radius: 24px;
            width: 100%; max-width: 420px; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            text-align: center;
        }

        /* ============================================================
           4. NAVEGACIÓN (NAVBAR)
           ============================================================ */
        .nav {
            position: fixed; top: 0; left: 0; right: 0; height: var(--nh);
            z-index: 1000; background: var(--nv); display: flex; align-items: center;
            padding: 0 30px; box-shadow: 0 10px 15px rgba(0,0,0,0.1);
        }
        .nav-brand img { height: 42px; filter: brightness(0) invert(1); }
        .nav-tabs { display: flex; gap: 8px; margin-left: 30px; }

        .tb {
            background: none; border: none; color: rgba(255,255,255,0.6);
            font-family: inherit; font-size: 15px; font-weight: 600;
            cursor: pointer; padding: 10px 18px; border-radius: 12px; transition: 0.3s;
        }
        .tb.on { color: #fff; background: rgba(255,255,255,0.15); box-shadow: inset 0 -3px 0 var(--gold); }

        /* ============================================================
           5. PANTALLAS Y CONTENEDORES
           ============================================================ */
        .sc {
            display: none; 
            padding: calc(var(--nh) + 35px) 25px 60px; 
            min-height: 100vh; max-width: 1200px; margin: 0 auto;
        }
        .sc.on { display: block; }

        /* ============================================================
           6. COMPONENTES (CARDS, BOTONES, INPUTS)
           ============================================================ */
        .card { 
            background: white; border-radius: 20px; border: 1px solid var(--bor); 
            padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); margin-bottom: 20px;
        }
        .btn { 
            display: inline-flex; align-items: center; gap: 10px;
            padding: 14px 28px; border-radius: 14px; border: none;
            font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer;
        }
        .btn-nv { background: var(--nv); color: white; }
        .btn-ext { background: #7C3AED; color: white; }

        .fi { margin-bottom: 20px; position: relative; }
        .fi label { display: block; font-size: 12px; font-weight: 800; color: var(--tx2); text-transform: uppercase; margin-bottom: 8px; }
        .fi input, .fi select { 
            width: 100%; padding: 15px; border: 1.5px solid #E2E8F0; border-radius: 14px;
            font-size: 16px; outline: none;
        }

        /* ============================================================
           7. ALERTAS Y ANIMACIONES
           ============================================================ */
        .frec-v { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; padding: 15px; border-radius: 12px; }
        .frec-a { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; padding: 15px; border-radius: 12px; animation: pulse 2s infinite; }
        .frec-r { background: #fef2f2; color: #991b1b; border: 2px solid #fca5a5; padding: 15px; border-radius: 12px; font-weight: bold; animation: shake 0.5s infinite; }
        .alergia-alarm { background: #fff9c4 !important; border: 2px solid #fbc02d !important; color: #827717 !important; font-weight: 800; padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 10px; margin: 15px 0; }

        @keyframes pulse { 0% {opacity:1} 50% {opacity:0.7} 100% {opacity:1} }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 10% { transform: translate(-1px, -1px); } 100% { transform: translate(0, 0); } }

        /* Estilo Buscador Dropdown */
        .sd { position: absolute; top: 100%; left: 0; right: 0; background: white; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.15); z-index: 1100; max-height: 250px; overflow-y: auto; display: none; }
        .sd.show { display: block; }
        .si-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #f1f5f9; }
        .si-item:hover { background: #f8fafc; }

    </style>
</head>
<body class="bg-medico">

<!-- ============================================================
     SECCIÓN: PANTALLA DE LOGIN
     ============================================================ -->
<div id="login-screen">
  <div class="login-card">
    <img src="https://i.ibb.co/m0S8pXh/logo-auna.png" alt="Logo" style="height: 50px; margin-bottom: 20px;">
    <h2>Acceso Salud Ocupacional</h2>
    <p style="color:var(--tx2); margin-bottom:30px;">Selecciona tu perfil de acceso</p>
    
    <div class="fi">
      <label>👤 Usuario</label>
      <select id="login-sel">
        <option value="">Cargando usuarios...</option>
      </select>
    </div>
    <button class="btn btn-nv" style="width:100%" onclick="doLogin()">Entrar al Sistema →</button>
  </div>
</div>

<!-- ============================================================
     SECCIÓN: APP SHELL (NAVBAR Y NAVEGACIÓN)
     ============================================================ -->
<div id="app" style="display:none">
  <nav class="nav">
    <div class="nav-brand"><img src="https://i.ibb.co/m0S8pXh/logo-auna.png" alt="AUNA"></div>
    <div class="nav-tabs" id="nav-tabs"></div>
    <div style="margin-left:auto; display:flex; align-items:center; gap:20px">
        <div id="user-display" style="color:white; font-weight:700"></div>
        <button onclick="location.reload()" style="background:none; border:none; color:white; font-size:12px; cursor:pointer; opacity:0.7">Cerrar Sesión</button>
    </div>
  </nav>

  <!-- ============================================================
       PANTALLA: EXPEDIENTE Y BUSCADOR
       ============================================================ -->
  <div class="sc on" id="sc-inicio">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
        <h2>Buscador de Personal</h2>
        <div style="display:flex; gap:10px">
            <button class="btn btn-ext" onclick="nuevaConsultaExterna()">👤 Empleado Externo</button>
            <button class="btn btn-gh" onclick="location.reload()">🔄 Sincronizar</button>
        </div>
    </div>

    <!-- Buscador Maestro -->
    <div class="card">
        <div class="fi" style="margin:0">
            <label>🔍 Escribe el nombre o No. de Empleado</label>
            <input type="text" id="q-master" placeholder="Ej: Juan Perez o 12345..." oninput="buscarMaster(this.value)" autocomplete="off">
            <div id="res-master" class="sd"></div>
        </div>
    </div>

    <!-- Resultados del Expediente -->
    <div id="view-expediente" style="display:none">
        <div id="exp-alertas"></div>
        <div class="card" id="exp-header" style="background:var(--nv); color:white"></div>
        <div class="card">
            <h4>📋 Historial Reciente</h4>
            <div id="exp-historial" style="margin-top:20px">
                <p style="color:var(--tx2)">No hay consultas en los últimos 30 días.</p>
            </div>
        </div>
    </div>
  </div>

  <!-- PANTALLA: CAPTURA (PROXIMAMENTE FASE 3) -->
  <div class="sc" id="sc-captura">
    <div class="card">
        <h2>Captura de Valoración</h2>
        <p>Este módulo se activará en la Fase 3.</p>
        <button class="btn btn-gh" onclick="go('inicio')" style="margin-top:20px">Volver al Buscador</button>
    </div>
  </div>

</div>

<!-- ============================================================
     SECCIÓN: JAVASCRIPT - LÓGICA DEL SISTEMA
     ============================================================ -->
<script>
/* --- 1. DATOS INICIALES (Simulados hasta conectar GAS) --- */
const HeadCount = [
  { noEmp: "1010", nombre: "JUAN PEREZ GARCIA", depto: "PRODUCCION", planta: "AMERICAS", alergias: "PENICILINA", edad: 28, genero: "M" },
  { noEmp: "2020", nombre: "MARIA SOFIA LOPEZ", depto: "CALIDAD", planta: "JUAREZ", alergias: null, edad: 34, genero: "F" },
  { noEmp: "3030", nombre: "CARLOS RUIZ", depto: "MANTENIMIENTO", planta: "AMERICAS", alergias: "LATEX", edad: 45, genero: "M" }
];

const ConsultasPrevias = [
    { noEmp: "1010", fecha: "2024-03-01", diagnostico: "Gripe común" },
    { noEmp: "1010", fecha: "2024-03-05", diagnostico: "Control de TA" },
    { noEmp: "1010", fecha: "2024-03-10", diagnostico: "Dolor lumbar" }
];

let EXTERNOS = JSON.parse(localStorage.getItem('auna_externos') || '[]');
let _selectedEmp = null;

/* --- 2. GESTIÓN DE ACCESO --- */
document.addEventListener('DOMContentLoaded', () => {
    const usuarios = [
        { nombre: "Dr. Jaime Martinez", rol: "medico" },
        { nombre: "Enf. Socorro Sanchez", rol: "enfermeria" },
        { nombre: "Lic. Nutrición", rol: "nutricion" }
    ];
    document.getElementById('login-sel').innerHTML = usuarios.map(u => 
        `<option value='${JSON.stringify(u)}'>${u.nombre}</option>`
    ).join('');
});

function doLogin() {
    const user = JSON.parse(document.getElementById('login-sel').value);
    document.body.className = 'bg-' + user.rol;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('user-display').textContent = user.nombre;
    
    // Generar Menu
    const tabs = [{id:'inicio', label:'🔍 Expediente'}, {id:'captura', label:'📝 Captura'}];
    document.getElementById('nav-tabs').innerHTML = tabs.map(t => `<button class="tb" id="tb-${t.id}" onclick="go('${t.id}')">${t.label}</button>`).join('');
    go('inicio');
}

/* --- 3. LÓGICA DEL BUSCADOR --- */
function buscarMaster(val) {
    const drop = document.getElementById('res-master');
    if (val.length < 2) { drop.classList.remove('show'); return; }

    const q = val.toLowerCase();
    const todos = [...HeadCount, ...EXTERNOS];
    const matches = todos.filter(e => e.nombre.toLowerCase().includes(q) || e.noEmp.includes(q));

    if (matches.length > 0) {
        drop.innerHTML = matches.map(e => `
            <div class="si-item" onclick="verExpediente('${e.noEmp}')">
                <strong>${e.nombre}</strong> <small>(${e.noEmp})</small><br>
                <span style="font-size:11px; color:var(--tx2)">${e.planta} - ${e.depto}</span>
            </div>
        `).join('');
        drop.classList.add('show');
    } else {
        drop.classList.remove('show');
    }
}

/* --- 4. EXPEDIENTE Y ALERTAS --- */
function verExpediente(noEmp) {
    _selectedEmp = [...HeadCount, ...EXTERNOS].find(e => e.noEmp === noEmp);
    document.getElementById('res-master').classList.remove('show');
    document.getElementById('view-expediente').style.display = 'block';
    
    // Header Info
    document.getElementById('exp-header').innerHTML = `
        <h2 style="color:white; margin:0">${_selectedEmp.nombre}</h2>
        <p>No. Empleado: ${_selectedEmp.noEmp} | Depto: ${_selectedEmp.depto} | Planta: ${_selectedEmp.planta}</p>
    `;

    // 1. Alerta Alergias
    let htmlAlertas = '';
    if (_selectedEmp.alergias) {
        htmlAlertas += `<div class="alergia-alarm">🚨 DATO DE ALARMA: ALERGIAS A ${_selectedEmp.alergias}</div>`;
    }

    // 2. Alerta Frecuencia (Simulada con ConsultasPrevias)
    const hoy = new Date();
    const hace30Dias = new Date(); hace30Dias.setDate(hoy.getDate() - 30);
    const visitas = ConsultasPrevias.filter(c => c.noEmp === noEmp).length; // Aqui iría filtro por fecha real

    if (visitas >= 8) {
        htmlAlertas += `<div class="frec-r">🚨 ALERTA ROJA: El paciente ha venido ${visitas} veces en los últimos 30 días.</div>`;
    } else if (visitas >= 4) {
        htmlAlertas += `<div class="frec-a">⚠️ FRECUENCIA MODERADA: ${visitas} visitas en el mes.</div>`;
    } else if (visitas > 0) {
        htmlAlertas += `<div class="frec-v">✅ Frecuencia normal: ${visitas} visitas en el último mes.</div>`;
    }

    document.getElementById('exp-alertas').innerHTML = htmlAlertas;
}

/* --- 5. FUNCIONES DE APOYO --- */
function go(id) {
    document.querySelectorAll('.sc').forEach(s => s.classList.remove('on'));
    document.getElementById('sc-' + id).classList.add('on');
    document.querySelectorAll('.tb').forEach(b => b.classList.remove('on'));
    document.getElementById('tb-' + id).classList.add('on');
}

function nuevaConsultaExterna() {
    const nombre = prompt("Nombre completo del externo:");
    const empresa = prompt("Compañía:");
    if (!nombre) return;

    const nuevoExt = {
        noEmp: "EXT-" + Date.now(),
        nombre: nombre.toUpperCase(),
        depto: empresa.toUpperCase(),
        planta: "EXTERNO",
        alergias: null
    };
    EXTERNOS.push(nuevoExt);
    localStorage.setItem('auna_externos', JSON.stringify(EXTERNOS));
    verExpediente(nuevoExt.noEmp);
}

</script>
</body>
</html>
