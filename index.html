<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
    <title>Teleflex SO — Salud Ocupacional</title>
    
    <!-- FUENTES Y LIBRERIAS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ============================================================
           1. VARIABLES Y TEMAS CORPORATIVOS
           ============================================================ */
        :root {
            --primary-bg: #0d4444;    /* Verde oscuro gradiente */
            --secondary-bg: #1a3a5c;  /* Azul oscuro gradiente */
            --btn-green: #3a8076;     /* Verde botón Teleflex */
            --nv: #0F2942;            /* Azul Marino Teleflex */
            --tl: #0D6B5E;            /* Teal AUNA */
            --tx: #0F172A;
            --tx2: #64748B;
            --nh: 75px;
        }

        .bg-medico { background-color: #F1F5F9 !important; background-image: none !important; }
        .bg-enfermeria { background-color: #E0F2FE !important; background-image: none !important; }
        .bg-nutricion { background-color: #DCFCE7 !important; background-image: none !important; }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 16px; line-height: 1.6; transition: background 0.5s ease; }

        /* ============================================================
           2. ESTILOS DE LOGOS
           ============================================================ */
        .logo-login { height: 50px; margin-bottom: 20px; object-fit: contain; }
        .nav-logo-img { height: 35px; object-fit: contain; filter: brightness(0) invert(1); opacity: 0.9; }

        /* ============================================================
           3. LOGIN (ESTILO IMAGEN)
           ============================================================ */
        #login-screen { position: fixed; inset: 0; z-index: 2000; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle at center, var(--secondary-bg) 0%, var(--primary-bg) 100%); }
        .login-card { background: white; padding: 40px; border-radius: 25px; width: 100%; max-width: 400px; box-shadow: 0 30px 60px rgba(0,0,0,0.5); text-align: center; }
        .login-card h2 { color: var(--nv); font-size: 22px; font-weight: 800; margin-bottom: 5px; }
        .login-card p { color: var(--tx2); font-size: 13px; margin-bottom: 30px; }
        .login-card .fi { text-align: left; margin-bottom: 20px; }
        .login-card label { display: block; font-size: 10px; font-weight: 800; color: #94a3b8; letter-spacing: 1px; margin-bottom: 8px; }
        .login-card select { width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 14px; outline: none; background-color: #fff; }
        .btn-login { width: 100%; background: var(--btn-green); color: white; padding: 15px; border: none; border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 10px; transition: 0.3s; }

        /* ============================================================
           4. NAVEGACIÓN
           ============================================================ */
        #app { display: none; }
        .nav { position: fixed; top: 0; left: 0; right: 0; height: var(--nh); z-index: 1000; background: var(--nv); display: flex; align-items: center; padding: 0 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .nav-tabs { display: flex; gap: 5px; margin-left: 30px; }
        .tb { background: none; border: none; color: rgba(255,255,255,0.6); font-size: 14px; font-weight: 600; cursor: pointer; padding: 10px 15px; border-radius: 8px; transition: 0.2s; }
        .tb.on { color: white; background: rgba(255,255,255,0.1); }

        /* ============================================================
           5. PANTALLAS
           ============================================================ */
        .sc { display: none; padding: calc(var(--nh) + 40px) 25px 50px; max-width: 1200px; margin: 0 auto; }
        .sc.on { display: block; }
        .card { background: white; border-radius: 20px; padding: 30px; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 5px 20px rgba(0,0,0,0.02); margin-bottom: 20px; }

        /* ============================================================
           6. ALERTAS DINÁMICAS (DATOS DE ALARMA)
           ============================================================ */
        .alergia-alarm { background: #fff9c4 !important; border: 2px solid #fbc02d !important; color: #827717 !important; font-weight: 800; padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 10px; margin: 10px 0; }
        .cronico-alarm { background: #FFEDD5 !important; border: 2px solid #F59E0B !important; color: #92400E !important; font-weight: 800; padding: 15px; border-radius: 12px; display: flex; align-items: center; gap: 10px; margin: 10px 0; }
        .alimentaria-badge { background: #DC2626; color: white; padding: 2px 8px; border-radius: 5px; font-size: 10px; text-transform: uppercase; margin-left: auto; }
        .frec-r { background: #fef2f2; color: #991b1b; border: 2px solid #fca5a5; padding: 15px; border-radius: 12px; font-weight: bold; animation: shake 0.5s infinite; }
        
        @keyframes pulse { 0% {opacity:1} 50% {opacity:0.7} 100% {opacity:1} }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 10% { transform: translate(-1px, -1px); } 100% { transform: translate(0, 0); } }

        /* ============================================================
           7. FORMULARIOS
           ============================================================ */
        .fi { margin-bottom: 20px; position: relative; }
        .fi label { display: block; font-size: 12px; font-weight: 800; color: var(--tx2); text-transform: uppercase; margin-bottom: 8px; }
        .fi input, .fi select, .fi textarea { width: 100%; padding: 15px; border: 1.5px solid #E2E8F0; border-radius: 14px; font-size: 16px; outline: none; background: #fff; }
        .btn-nv { background: var(--nv); color: white; padding: 12px 25px; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; }
        .sd { position: absolute; top: 105%; left: 0; right: 0; background: white; border-radius: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.15); z-index: 2000; max-height: 250px; overflow-y: auto; display: none; }
        .sd.show { display: block; }
        .si-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #f1f5f9; display: flex; flex-direction: column; }
        .si-item:hover { background: #f8fafc; }
    </style>
</head>
<body class="bg-medico">

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <img src="https://companieslogo.com/img/orig/TFX-650c3fb4.png?t=1720244494" alt="Teleflex Logo" class="logo-login">
    <h2>Teleflex SO</h2>
    <p>Portal de Gestión Unificada</p>
    <div class="fi">
      <label>SELECCIONA TU USUARIO</label>
      <select id="login-sel"><option value="">Cargando...</option></select>
    </div>
    <button class="btn-login" onclick="doLogin()">Entrar →</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav class="nav">
    <img src="https://companieslogo.com/img/orig/TFX-650c3fb4.png?t=1720244494" alt="Teleflex" class="nav-logo-img">
    <div class="nav-tabs" id="nav-tabs"></div>
    <div id="user-info" style="margin-left:auto; color:white; font-size:13px; font-weight:600; background:rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 20px;"></div>
  </nav>

  <div class="sc on" id="sc-inicio">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
        <h2>Buscador Maestro</h2>
        <button class="btn-nv" style="background:var(--tl)" onclick="location.reload()">🔄 Sincronizar</button>
    </div>

    <div class="card">
        <div class="fi" style="margin:0">
            <label>🔍 Buscar por Nombre o Nómina</label>
            <input type="text" id="q-master" placeholder="Ej: Juan Perez..." oninput="buscarMaster(this.value)" autocomplete="off">
            <div id="res-master" class="sd"></div>
        </div>
    </div>

    <div id="view-expediente" style="display:none">
        <!-- Alertas de Alarma -->
        <div id="exp-alertas"></div>

        <!-- Cabecera -->
        <div class="card" id="exp-header" style="background:var(--nv); color:white; border:none;">
        </div>

        <!-- Historial / Captura -->
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px">
                <h4>📋 Historial Clínico</h4>
                <button class="btn-login" style="width:auto; padding:10px 20px" onclick="go('captura')">➕ Nueva Consulta</button>
            </div>
            <div id="exp-historial" style="font-size: 14px; color:var(--tx2)">
                <!-- Aquí se muestra historial -->
            </div>
        </div>
    </div>
  </div>

  <!-- PANTALLA CAPTURA -->
  <div class="sc" id="sc-captura">
      <div class="card" id="form-container">
          <!-- Aquí se genera el formulario según puesto -->
      </div>
  </div>
</div>

<script>
/* --- CONFIGURACIÓN Y DATOS --- */
let USER_ACTUAL = null;
const HeadCount = [
  { noEmp: "1010", nombre: "JUAN PEREZ GARCIA", planta: "AMERICAS", alergias: "MARISCOS", esAlimentaria: true, cronicos: "HIPERTENSIÓN", edad: 28 },
  { noEmp: "2020", nombre: "MARIA LOPEZ", planta: "BARRANCAS", alergias: "POLVO", esAlimentaria: false, cronicos: "ASMA", edad: 34 },
  { noEmp: "3030", nombre: "CARLOS RUIZ", planta: "AMERICAS", alergias: "PENICILINA", esAlimentaria: false, cronicos: "DIABETES TIPO 2", edad: 45 }
];

const ConsultasPrevias = [ { noEmp: "1010", fecha: "2024-03-20" }, { noEmp: "1010", fecha: "2024-03-22" }, { noEmp: "1010", fecha: "2024-03-25" }, { noEmp: "1010", fecha: "2024-03-26" }, { noEmp: "1010", fecha: "2024-03-27" }, { noEmp: "1010", fecha: "2024-03-28" }, { noEmp: "1010", fecha: "2024-03-29" }, { noEmp: "1010", fecha: "2024-03-30" }];

/* --- LOGIN --- */
document.addEventListener('DOMContentLoaded', () => {
    const usuarios = [
        { nombre: "Dr. Jaime Martinez", rol: "medico" },
        { nombre: "Enf. Socorro Sanchez", rol: "enfermeria" },
        { nombre: "Lic. Nutrición", rol: "nutricion" }
    ];
    document.getElementById('login-sel').innerHTML = usuarios.map(u => `<option value='${JSON.stringify(u)}'>${u.nombre}</option>`).join('');
});

function doLogin() {
    USER_ACTUAL = JSON.parse(document.getElementById('login-sel').value);
    document.body.className = 'bg-' + USER_ACTUAL.rol;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('user-info').textContent = USER_ACTUAL.nombre.toUpperCase();
    document.getElementById('nav-tabs').innerHTML = [{id:'inicio', label:'🔍 Expediente'}].map(t => `<button class="tb" id="tb-${t.id}" onclick="go('${t.id}')">${t.label}</button>`).join('');
}

/* --- BUSCADOR --- */
function buscarMaster(val) {
    const drop = document.getElementById('res-master');
    if (val.length < 2) { drop.classList.remove('show'); return; }
    const q = val.toLowerCase();
    const matches = HeadCount.filter(e => e.nombre.toLowerCase().includes(q) || String(e.noEmp).includes(q));
    if (matches.length > 0) {
        drop.innerHTML = matches.map(e => `<div class="si-item" onclick="verExpediente('${e.noEmp}')"><strong>${e.nombre}</strong><small>No. ${e.noEmp}</small></div>`).join('');
        drop.classList.add('show');
    } else { drop.classList.remove('show'); }
}

/* --- EXPEDIENTE CON PRIVACIDAD --- */
function verExpediente(noEmp) {
    const emp = HeadCount.find(e => e.noEmp === noEmp);
    document.getElementById('res-master').classList.remove('show');
    document.getElementById('view-expediente').style.display = 'block';
    
    // Cabecera básica
    document.getElementById('exp-header').innerHTML = `<h2 style="color:white; margin:0">${emp.nombre}</h2><p style="opacity:0.8">Reloj: ${emp.noEmp} | Planta: ${emp.planta}</p>`;

    let alertas = '';
    
    // LÓGICA DE PRIVACIDAD: Nutrición vs Médico/Enf
    if (USER_ACTUAL.rol === 'nutricion') {
        // Nutrición solo ve Alergias y Crónicos
        if (emp.alergias) {
            alertas += `<div class="alergia-alarm">⚡ ALERGIA: ${emp.alergias} ${emp.esAlimentaria ? '<span class="alimentaria-badge">Alimentaria</span>' : ''}</div>`;
        }
        if (emp.cronicos) {
            alertas += `<div class="cronico-alarm">📋 CRÓNICO: ${emp.cronicos}</div>`;
        }
    } else {
        // Médico y Enfermería ven TODO incluyendo frecuencia
        if (emp.alergias) {
            alertas += `<div class="alergia-alarm">⚡ ALERGIA: ${emp.alergias}</div>`;
        }
        if (emp.cronicos) {
            alertas += `<div class="cronico-alarm">📋 CRÓNICO: ${emp.cronicos}</div>`;
        }
        const visitas = ConsultasSimuladas.filter(c => c.noEmp === noEmp).length;
        if (visitas >= 8) {
            alertas += `<div class="frec-r">🚨 ALERTA ROJA: El paciente ha visitado el servicio ${visitas} veces en 30 días.</div>`;
        } else if (visitas >= 4) {
            alertas += `<div class="frec-a">⚠️ FRECUENCIA MODERADA: ${visitas} visitas recientes.</div>`;
        }
    }

    document.getElementById('exp-alertas').innerHTML = alertas;
    document.getElementById('exp-historial').innerHTML = "Registros cargados desde el servidor local.";
}

/* --- CAPTURA ESPECÍFICA PARA NUTRICIÓN --- */
function go(id) {
    if (id === 'captura') {
        renderFormCaptura();
    }
    document.querySelectorAll('.sc').forEach(s => s.classList.remove('on'));
    document.getElementById('sc-' + id).classList.add('on');
}

function renderFormCaptura() {
    const cont = document.getElementById('form-container');
    let html = `<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px"><h2>Nueva Valoración</h2><button class="btn-nv" style="background:#64748B" onclick="go('inicio')">Volver</button></div>`;
    
    if (USER_ACTUAL.rol === 'nutricion') {
        html += `
            <div class="fi"><label>Diagnóstico Nutricional</label><input type="text" placeholder="Ej: Obesidad tipo I..."></div>
            <div class="card" style="background:#F0FDF4; border: 1px dashed #16A34A">
                <p style="font-size:12px; font-weight:700; color:#166534; margin-bottom:10px">🍎 ACTUALIZAR ALERGIAS / CRÓNICOS (Si es alimentaria)</p>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px">
                    <div class="fi" style="margin:0"><label>Nueva Alergia</label><input type="text" id="nut-nueva-alergia"></div>
                    <div class="fi" style="margin:0; display:flex; align-items:center; gap:10px"><label style="margin:0">¿Es Alimentaria?</label><input type="checkbox" style="width:25px; height:25px" id="nut-es-alimentaria"></div>
                </div>
            </div>
            <div class="fi" style="margin-top:20px"><label>Plan Alimenticio</label><textarea rows="5"></textarea></div>
        `;
    } else {
        html += `
            <div class="fi"><label>Diagnóstico Médico</label><input type="text"></div>
            <div class="fi"><label>Signos Vitales</label><input type="text" placeholder="TA, FC, T, SatO2..."></div>
            <div class="fi"><label>Tratamiento</label><textarea rows="5"></textarea></div>
        `;
    }
    html += `<button class="btn-login" style="width:100%" onclick="alert('✅ Guardado exitoso')">💾 Guardar Valoración</button>`;
    cont.innerHTML = html;
}

</script>
</body>
</html>
