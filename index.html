<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
    <title>AUNA Salud Ocupacional — Teleflex</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

    <style>
        /* ============================================================
           1. SISTEMA DE COLORES (CO-BRANDING)
           ============================================================ */
        :root {
            --teleflex-blue: #0F2942;
            --auna-teal: #0D6B5E;
            --auna-green: #16A34A;
            --tf-gold: #B8962E;
            --nv: var(--teleflex-blue);
            --tl: var(--auna-teal);
            --gr: var(--auna-green);
            --gold: var(--tf-gold);
            --rd: #DC2626;
            --am: #D97706;
            --sf: #FFFFFF;
            --sf2: #F8FAFC;
            --bor: rgba(0,0,0,0.1);
            --nh: 85px;
        }

        .bg-medico { background-color: #F1F5F9 !important; }
        .bg-enfermeria { background-color: #F0F9FF !important; }
        .bg-nutricion { background-color: #F0FDF4 !important; }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 16px; color: var(--teleflex-blue); line-height: 1.6; transition: background 0.5s; }

        /* ============================================================
           2. NAVEGACIÓN CORPORATIVA
           ============================================================ */
        .nav {
            position: fixed; top: 0; left: 0; right: 0; height: var(--nh);
            z-index: 1000; background: var(--teleflex-blue); display: flex; align-items: center;
            padding: 0 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        .nav-logos { display: flex; align-items: center; gap: 15px; }
        .nav-logo-img { height: 35px; filter: brightness(0) invert(1); }
        .nav-tabs { display: flex; gap: 5px; margin-left: 25px; border-left: 1px solid rgba(255,255,255,0.2); padding-left: 20px; }
        .tb { background: none; border: none; color: rgba(255,255,255,0.6); font-size: 15px; font-weight: 600; cursor: pointer; padding: 10px 18px; border-radius: 10px; transition: 0.3s; }
        .tb.on { color: #fff; background: rgba(255,255,255,0.1); box-shadow: inset 0 -3px 0 var(--gold); }

        /* ============================================================
           3. COMPONENTES Y PANTALLAS
           ============================================================ */
        .sc { display: none; padding: calc(var(--nh) + 30px) 25px 60px; min-height: 100vh; max-width: 1300px; margin: 0 auto; }
        .sc.on { display: block; }
        .card { background: var(--sf); border-radius: 24px; border: 1px solid var(--bor); padding: 35px; box-shadow: 0 10px 30px rgba(0,0,0,0.04); margin-bottom: 25px; }
        .exp-hero { background: linear-gradient(135deg, var(--teleflex-blue) 0%, var(--auna-teal) 100%); color: white; padding: 30px; border-radius: 24px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        .btn { display: inline-flex; align-items: center; gap: 10px; padding: 14px 28px; border-radius: 14px; border: none; font-family: inherit; font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .btn-tf { background: var(--teleflex-blue); color: white; }
        .btn-auna { background: var(--auna-green); color: white; }
        .btn-gh { background: #f1f5f9; color: var(--tx2); border: 1px solid #e2e8f0; }

        /* ============================================================
           4. FORMULARIOS CLÍNICOS
           ============================================================ */
        .fi { margin-bottom: 20px; position: relative; }
        .fi label { display: block; font-size: 11px; font-weight: 800; color: var(--tx2); text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px; }
        .fi input, .fi select, .fi textarea { width: 100%; padding: 15px; border: 1.5px solid #E2E8F0; border-radius: 14px; font-size: 16px; outline: none; background: #fff; font-family: inherit; }
        .fi input:focus { border-color: var(--tl); }
        .fi input[readonly] { background: #f8fafc; color: #64748b; font-weight: 700; }
        .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .g3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        .g4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }

        /* Alertas */
        .frec-r { background: #fef2f2; color: #991b1b; border: 2px solid #fca5a5; padding: 18px; border-radius: 15px; font-weight: 700; animation: shake 0.5s infinite; margin-bottom: 15px; }
        .alergia-alarm { background: #FFF9C4; border: 2px solid #FBC02D; color: #827717; font-weight: 800; padding: 18px; border-radius: 15px; margin: 15px 0; display: flex; align-items: center; gap: 12px; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-2px);} 75% {transform: translateX(2px);} }

        /* CIE-10 y Buscador */
        .sd { position: absolute; top: 100%; left: 0; right: 0; background: white; border-radius: 14px; box-shadow: 0 15px 40px rgba(0,0,0,0.15); z-index: 1100; max-height: 280px; overflow-y: auto; display: none; margin-top: 5px; }
        .sd.show { display: block; }
        .si-item { padding: 15px; cursor: pointer; border-bottom: 1px solid #f1f5f9; }
        .si-item:hover { background: #f8fafc; }

        /* Módulo Nutrición Resultados */
        #nut-calc-box { background: #f0fdf4; border: 1.5px solid #bbf7d0; border-radius: 15px; padding: 20px; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="lc" style="position: fixed; inset: 0; background: radial-gradient(circle at center, #1a3a5c 0%, #0d4444 100%); display: flex; align-items: center; justify-content: center; z-index: 2000;">
    <div style="background: white; padding: 45px; border-radius: 30px; width: 420px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.4);">
        <div style="display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 30px;">
            <img src="https://i.ibb.co/m0S8pXh/logo-auna.png" alt="AUNA" style="height: 55px;">
            <div style="width: 1px; height: 40px; background: #eee;"></div>
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Teleflex_logo.svg/2560px-Teleflex_logo.svg.png" alt="Teleflex" style="height: 30px;">
        </div>
        <h2 style="color:var(--nv); margin-bottom: 10px;">Salud Ocupacional</h2>
        <div class="fi"><label>👤 Iniciar Sesión Como:</label><select id="login-sel"></select></div>
        <button class="btn btn-tf" style="width:100%; padding: 16px;" onclick="doLogin()">Entrar →</button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <nav class="nav">
    <div class="nav-logos">
        <img src="https://i.ibb.co/m0S8pXh/logo-auna.png" alt="AUNA" class="nav-logo-img">
        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/d/d3/Teleflex_logo.svg/2560px-Teleflex_logo.svg.png" alt="Teleflex" class="nav-logo-img" style="height:20px">
    </div>
    <div class="nav-tabs" id="nav-tabs"></div>
    <div style="margin-left:auto; display:flex; align-items:center; gap:20px">
        <div id="user-display" style="color:white; font-weight:700; font-size: 13px;"></div>
        <button onclick="location.reload()" style="background:none; border:none; color:white; font-size:12px; cursor:pointer; opacity:0.6;">Cerrar Sesión</button>
    </div>
  </nav>

  <!-- PANTALLA: EXPEDIENTE -->
  <div class="sc on" id="sc-inicio">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px">
        <h2>Expediente Clínico</h2>
        <div style="display:flex; gap:10px">
            <button class="btn" style="background: #7C3AED; color:white" onclick="nuevaConsultaExterna()">👤 Externo</button>
            <button class="btn btn-gh" onclick="location.reload()">🔄 Sync</button>
        </div>
    </div>

    <div class="card">
        <div class="fi" style="margin:0">
            <label>🔍 Buscar Trabajador</label>
            <div class="sw">
                <input type="text" id="q-master" placeholder="Nombre o Nómina..." oninput="buscarMaster(this.value)" autocomplete="off">
                <div id="res-master" class="sd"></div>
            </div>
        </div>
    </div>

    <div id="view-expediente" style="display:none">
        <div id="exp-alertas"></div>
        <div class="exp-hero" id="exp-hero"></div>
        <div id="exp-nut-tracking"></div>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px">
                <h3>📋 Historial</h3>
                <button class="btn btn-tf" onclick="abrirCapturaNueva()">➕ Nueva Consulta</button>
            </div>
            <div id="exp-historial"></div>
        </div>
    </div>
  </div>

  <!-- PANTALLA: CAPTURA -->
  <div class="sc" id="sc-captura">
    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px">
            <h2 id="cap-titulo">Captura de Nota</h2>
            <button class="btn btn-gh" onclick="go('inicio')">❌ Cancelar</button>
        </div>
        
        <div id="cap-alertas-frec"></div>
        <div id="cap-alertas-alergia"></div>

        <div class="g2">
            <div class="fi"><label>Fecha</label><input type="date" id="c-fecha" readonly></div>
            <div class="fi"><label>Hora</label><input type="time" id="c-hora" readonly></div>
        </div>

        <div id="form-dinamico-captura"></div>
        
        <button class="btn btn-auna" style="width:100%; margin-top:30px; padding:18px; font-size: 18px;" onclick="guardarConsultaNueva()">💾 Guardar Valoración Permanentemente</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
/* ============================================================
   LÓGICA DE PROGRAMACIÓN - FASE 3
   ============================================================ */

const SK = {hc:'au_hc', cons:'au_cons', inc:'au_inc'};
let HC=[], CONS=[], INC=[], USER_ACTUAL=null, _selectedEmp=null;
let EXTERNOS = JSON.parse(localStorage.getItem('auna_externos') || '[]');

// Diagnósticos Sugeridos (CIE-10 Simplificado)
const CIE10 = [
    {c:'M54.5', d:'Lumbago no especificado'}, {c:'J00', d:'Rinofaringitis aguda'},
    {c:'K29.7', d:'Gastritis no especificada'}, {c:'E11.9', d:'Diabetes mellitus tipo 2'},
    {c:'I10', d:'Hipertensión arterial esencial'}, {c:'S93.4', d:'Esguince de tobillo'}
];

document.addEventListener('DOMContentLoaded', () => {
    HC = JSON.parse(localStorage.getItem(SK.hc) || '[]');
    CONS = JSON.parse(localStorage.getItem(SK.cons) || '[]');
    const usuarios = [
        { nombre: "Dr. Jaime Martinez", rol: "medico", cedula: "12021447" },
        { nombre: "Enf. Socorro Sanchez", rol: "enfermeria", cedula: "N/A" },
        { nombre: "Lic. Nutrición", rol: "nutricion", cedula: "887766" }
    ];
    document.getElementById('login-sel').innerHTML = usuarios.map(u => `<option value='${JSON.stringify(u)}'>${u.nombre}</option>`).join('');
});

function doLogin() {
    USER_ACTUAL = JSON.parse(document.getElementById('login-sel').value);
    document.body.className = 'bg-' + USER_ACTUAL.rol;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('user-display').textContent = USER_ACTUAL.nombre.toUpperCase();
    document.getElementById('nav-tabs').innerHTML = `<button class="tb on" onclick="go('inicio')">🔍 EXPEDIENTE</button>`;
    go('inicio');
}

/* --- BUSCADOR --- */
function buscarMaster(val) {
    const drop = document.getElementById('res-master');
    if (val.length < 2) { drop.classList.remove('show'); return; }
    const q = val.toLowerCase();
    const todos = [...HC, ...EXTERNOS];
    const matches = todos.filter(e => e.nombre.toLowerCase().includes(q) || String(e.noEmp).includes(q));
    if (matches.length > 0) {
        drop.innerHTML = matches.map(e => `
            <div class="si-item" onclick="verExpediente('${e.noEmp}')">
                <strong>${e.nombre}</strong> <small>(No.${e.noEmp})</small>
            </div>`).join('');
        drop.classList.add('show');
    } else { drop.classList.remove('show'); }
}

function verExpediente(noEmp) {
    _selectedEmp = [...HC, ...EXTERNOS].find(e => String(e.noEmp) === String(noEmp));
    document.getElementById('res-master').classList.remove('show');
    document.getElementById('view-expediente').style.display = 'block';
    
    document.getElementById('exp-hero').innerHTML = `
        <div><h2 style="color:white; margin:0">${_selectedEmp.nombre}</h2><p style="opacity:0.8">Reloj: ${_selectedEmp.noEmp} | Depto: ${_selectedEmp.depto}</p></div>
        <div style="text-align: right"><span style="background:rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 10px; font-weight: 700;">${_selectedEmp.edad || 'N/A'} AÑOS</span></div>`;

    let alertas = '';
    if (_selectedEmp.alergias) alertas += `<div class="alergia-alarm">⚡ ALERGIA REGISTRADA: ${_selectedEmp.alergias}</div>`;
    
    const visitas = CONS.filter(c => String(c.noEmp) === String(noEmp)).length;
    if(visitas >= 8) alertas += `<div class="frec-r">🚨 ALERTA ROJA: ${visitas} visitas en el último mes.</div>`;
    else if(visitas >= 4) alertas += `<div class="frec-a">⚠️ FRECUENCIA MODERADA: ${visitas} visitas.</div>`;

    document.getElementById('exp-alertas').innerHTML = alertas;
    renderHistorial();
}

/* --- CAPTURA --- */
function abrirCapturaNueva() {
    go('captura');
    const ahora = new Date();
    document.getElementById('c-fecha').value = ahora.toISOString().split('T')[0];
    document.getElementById('c-hora').value = ahora.toTimeString().slice(0,5);
    renderFormSegunRol();
}

function renderFormSegunRol() {
    const p = document.getElementById('form-dinamico-captura');
    if(USER_ACTUAL.rol === 'nutricion') {
        p.innerHTML = `
            <div class="g3">
                <div class="fi"><label>Peso (kg) *</label><input type="number" step="0.1" id="f-peso" oninput="calcMacros()"></div>
                <div class="fi"><label>Talla (cm) *</label><input type="number" id="f-talla" oninput="calcMacros()"></div>
                <div class="fi"><label>Objetivo</label><select id="f-obj" onchange="calcMacros()"><option value="bajar">Bajar de Peso</option><option value="musculo">Ganar Músculo</option><option value="mantener">Mantenimiento</option></select></div>
            </div>
            <div class="g3">
                <div class="fi"><label>% Grasa</label><input type="number" step="0.1" id="f-grasa"></div>
                <div class="fi"><label>Grasa Visceral</label><input type="number" id="f-visc"></div>
                <div class="fi"><label>Masa Magra (kg)</label><input type="number" step="0.1" id="f-magra"></div>
            </div>
            <div id="nut-calc-box">
                <div class="sec-t">📉 Macronutrientes Sugeridos</div>
                <div class="g4">
                    <div class="nut-card"><div class="nut-label">IMC</div><div class="nut-val" id="res-imc">-</div></div>
                    <div class="nut-card"><div class="nut-label">Proteína</div><div class="nut-val" id="res-prot">-</div></div>
                    <div class="nut-card"><div class="nut-label">Carbos</div><div class="nut-val" id="res-carb">-</div></div>
                    <div class="nut-card"><div class="nut-label">Grasas</div><div class="nut-val" id="res-gras">-</div></div>
                </div>
            </div>
            <div class="fi" style="margin-top:20px"><label>Plan Alimentario</label><textarea id="f-plan" rows="5"></textarea></div>`;
    } else {
        p.innerHTML = `
            <div class="g4">
                <div class="fi"><label>T/A</label><input type="text" id="f-ta" placeholder="120/80"></div>
                <div class="fi"><label>Peso</label><input type="number" step="0.1" id="f-peso" oninput="calcIMCMed()"></div>
                <div class="fi"><label>Talla</label><input type="number" id="f-talla" oninput="calcIMCMed()"></div>
                <div class="fi"><label>IMC</label><input type="text" id="f-imc" readonly></div>
            </div>
            <div class="fi"><label>Diagnóstico (CIE-10)</label><input type="text" id="f-dg" placeholder="Escriba o busque diagnóstico..."></div>
            <div class="fi"><label>Tratamiento y Plan</label><textarea id="f-plan" rows="6"></textarea></div>
            <div class="g2"><div class="fi"><label>Incapacidad (Días)</label><input type="number" id="f-inc" value="0"></div></div>`;
    }
}

// CÁLCULOS
function calcIMCMed() {
    const p = parseFloat(document.getElementById('f-peso').value);
    const t = parseFloat(document.getElementById('f-talla').value)/100;
    if(p && t) document.getElementById('f-imc').value = (p/(t*t)).toFixed(1);
}

function calcMacros() {
    const p = parseFloat(document.getElementById('f-peso').value);
    const t = parseFloat(document.getElementById('f-talla').value)/100;
    const obj = document.getElementById('f-obj').value;
    if(!p || !t) return;
    
    document.getElementById('nut-calc-box').style.display = 'block';
    const imc = (p/(t*t)).toFixed(1);
    document.getElementById('res-imc').textContent = imc;
    
    let kcal = p * 25; // Base simplificada
    if(obj === 'bajar') kcal -= 400;
    if(obj === 'musculo') kcal += 300;
    
    document.getElementById('res-prot').textContent = Math.round((kcal * 0.3) / 4) + 'g';
    document.getElementById('res-carb').textContent = Math.round((kcal * 0.4) / 4) + 'g';
    document.getElementById('res-gras').textContent = Math.round((kcal * 0.3) / 9) + 'g';
}

function renderHistorial() {
    const mis = CONS.filter(c => String(c.noEmp) === String(_selectedEmp.noEmp));
    document.getElementById('exp-historial').innerHTML = mis.map(c => `
        <div style="border-bottom: 1px solid var(--bor); padding: 15px 0">
            <div style="font-size: 12px; color: var(--tx2)">📅 ${c.fecha} - Por: ${c.doctor}</div>
            <div style="font-weight: 700; color: var(--nv)">${c.diagnostico}</div>
            <p style="font-size:14px">${c.plan}</p>
        </div>`).join('') || '<p>Sin registros.</p>';
}

function guardarConsultaNueva() {
    const cons = {
        noEmp: _selectedEmp.noEmp,
        fecha: new Date().toLocaleDateString(),
        diagnostico: document.getElementById('f-dg')?.value || 'Valoración',
        plan: document.getElementById('f-plan').value,
        doctor: USER_ACTUAL.nombre
    };
    CONS.push(cons);
    localStorage.setItem(SK.cons, JSON.stringify(CONS));
    toast("✅ Valoración guardada");
    go('inicio');
    verExpediente(_selectedEmp.noEmp);
}

function go(id) {
    document.querySelectorAll('.sc').forEach(s => s.classList.remove('on'));
    document.getElementById('sc-' + id).classList.add('on');
}

function toast(m) {
    const t = document.getElementById('toast');
    const b = document.createElement('div');
    b.className = 'ti ti-ok'; b.textContent = m;
    t.appendChild(b);
    setTimeout(() => b.remove(), 3000);
}

function nuevaConsultaExterna() {
    const n = prompt("Nombre:"); if (!n) return;
    const ext = { noEmp: "EXT-"+Date.now(), nombre: n.toUpperCase(), depto: "EXTERNO", edad: 30 };
    EXTERNOS.push(ext);
    localStorage.setItem('auna_externos', JSON.stringify(EXTERNOS));
    verExpediente(ext.noEmp);
}
</script>
</body>
</html>
